<!-- @dsCard group="Brand" viewport="700x230" name="App icon & wordmark" subtitle="Russelue cap + Norwegian flag + white infinity loop" -->
<!DOCTYPE html>
<html lang="nb"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--bg); display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .icon { width: 132px; height: 132px; border-radius: 28px; border: var(--border-sticker); box-shadow: var(--shadow-sticker); overflow: hidden; flex-shrink: 0; }
  .icon img { width: 100%; height: 100%; display: block; }
  .copy h3 { margin: 0 0 6px; }
  .copy p { max-width: 38ch; font-size: 0.92rem; }
  .loop { color: var(--primary); margin-top: 10px; }
</style></head>
<body>
  <div class="icon"><img src="../assets/app-icon.png" alt="Knuteloop app icon" /></div>
  <div class="copy">
    <div class="eyebrow">Brand mark</div>
    <h3>Knuteloop</h3>
    <p>The russelue cap with the Norwegian flag, wrapped in a white infinity loop on a red→navy gradient. Red &amp; navy live on the icon and splash; the app itself runs on cream, royal blue and yellow.</p>
    <div class="loop"><img src="../assets/knot-mark.svg" width="86" alt="loop knot mark" /></div>
  </div>
</body></html>
