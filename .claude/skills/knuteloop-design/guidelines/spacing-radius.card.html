<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radius" subtitle="sm → xl, plus full pill" -->
<!DOCTYPE html>
<html lang="nb"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg); display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 76px; height: 64px; background: var(--card); border: var(--border-sticker); box-shadow: var(--shadow-sticker-sm); }
  .tok { font-family: var(--font-mono); font-size: 0.66rem; color: var(--text-muted); }
  .pill { width: 100px; height: 44px; border-radius: var(--radius-full); }
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="tok">sm · 14</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><span class="tok">md · 18</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="tok">lg · 22</span></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="tok">xl · 26</span></div>
  <div class="item"><div class="box pill"></div><span class="tok">full · pill</span></div>
</body></html>
