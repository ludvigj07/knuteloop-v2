<!-- @dsCard group="Brand" viewport="700x230" name="The sticker principle" subtitle="Die-cut cards on warm paper — 2px ink border + hard shadow" -->
<!DOCTYPE html>
<html lang="nb"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px; background: var(--bg); display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
  .stack { display: flex; gap: 16px; flex-wrap: wrap; }
  .card { padding: 18px 20px; border-radius: var(--radius-lg); border: var(--border-sticker); box-shadow: var(--shadow-sticker); }
  .title { font-family: var(--font-display); font-weight: 800; font-size: 1.05rem; letter-spacing: -0.02em; white-space: nowrap; }
  .flame { display: flex; align-items: center; gap: 10px; }
</style></head>
<body>
  <div class="stack">
    <div class="card" style="background:var(--card);color:var(--text-strong)"><div class="title">Cream paper</div><div style="color:var(--text-muted);font-size:0.85rem">white card</div></div>
    <div class="card" style="background:var(--primary);color:#fff"><div class="title">Royal blue</div><div style="opacity:.8;font-size:0.85rem">structure & CTAs</div></div>
    <div class="card" style="background:var(--accent);color:var(--accent-foreground)"><div class="title">Golden yellow</div><div style="opacity:.75;font-size:0.85rem">highlights & hero</div></div>
    <div class="card flame" style="background:var(--card)"><img src="../assets/icons/streak-flame.svg" width="34" alt="streak flame" /><div><div class="title" style="font-family:var(--font-mono);font-size:1.4rem">7</div><div style="color:var(--text-muted);font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em">Streak</div></div></div>
  </div>
</body></html>
