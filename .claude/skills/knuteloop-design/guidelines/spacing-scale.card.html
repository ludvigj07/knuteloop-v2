<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base — space-1 … space-12" -->
<!DOCTYPE html>
<html lang="nb"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg); display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: var(--primary); border: 2px solid var(--foreground); border-radius: 4px; }
  .tok { font-family: var(--font-mono); font-size: 0.64rem; color: var(--text-muted); }
</style></head>
<body>
  <div class="item"><div class="bar" style="width:var(--space-1);height:var(--space-1)"></div><span class="tok">1·4</span></div>
  <div class="item"><div class="bar" style="width:var(--space-2);height:var(--space-2)"></div><span class="tok">2·8</span></div>
  <div class="item"><div class="bar" style="width:var(--space-3);height:var(--space-3)"></div><span class="tok">3·12</span></div>
  <div class="item"><div class="bar" style="width:var(--space-4);height:var(--space-4)"></div><span class="tok">4·16</span></div>
  <div class="item"><div class="bar" style="width:var(--space-5);height:var(--space-5)"></div><span class="tok">5·20</span></div>
  <div class="item"><div class="bar" style="width:var(--space-6);height:var(--space-6)"></div><span class="tok">6·24</span></div>
  <div class="item"><div class="bar" style="width:var(--space-8);height:var(--space-8)"></div><span class="tok">8·32</span></div>
  <div class="item"><div class="bar" style="width:var(--space-10);height:var(--space-10)"></div><span class="tok">10·40</span></div>
  <div class="item"><div class="bar" style="width:var(--space-12);height:var(--space-12)"></div><span class="tok">12·48</span></div>
</body></html>
