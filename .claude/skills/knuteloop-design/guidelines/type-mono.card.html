<!-- @dsCard group="Type" viewport="700x150" name="Numerals — JetBrains Mono" subtitle="Points, streaks, ranks use the mono face" -->
<!DOCTYPE html>
<html lang="nb"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg); display: flex; gap: 26px; align-items: baseline; flex-wrap: wrap; }
  .num { font-family: var(--font-mono); font-weight: 700; color: var(--text-strong); letter-spacing: -0.02em; }
  .cap { font-size: 0.66rem; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text-muted); }
  .stat { display: flex; flex-direction: column; gap: 2px; }
</style></head>
<body>
  <div class="stat"><span class="num" style="font-size:2.4rem">1 245</span><span class="cap">Poeng</span></div>
  <div class="stat"><span class="num" style="font-size:2.4rem">7</span><span class="cap">Dagers streak</span></div>
  <div class="stat"><span class="num" style="font-size:2.4rem">#3</span><span class="cap">Toppliste</span></div>
  <div class="stat"><span class="num" style="font-size:2.4rem">15</span><span class="cap">Knuter</span></div>
  <span style="font-family:var(--font-mono);font-size:0.72rem;color:var(--text-muted)">JetBrains Mono · --font-mono</span>
</body></html>
